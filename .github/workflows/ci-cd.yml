name: LLM Training Pipeline CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      dataset:
        description: 'Dataset to train on'
        required: false
        default: 'roneneldan/TinyStories'
      deploy:
        description: 'Deploy after training'
        required: false
        type: boolean
        default: false

env:
  PYTHON_VERSION: '3.10'
  DOCKER_IMAGE_NAME: llm-inference-server

jobs:
  # Job 1: Code Quality Checks
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy
          pip install -r requirements.txt
      
      - name: Run black (code formatting)
        run: |
          black --check src/ scripts/ *.py || true
      
      - name: Run isort (import sorting)
        run: |
          isort --check-only src/ scripts/ *.py || true
      
      - name: Run flake8 (linting)
        run: |
          flake8 src/ scripts/ *.py --max-line-length=100 --ignore=E203,W503 || true

  # Job 2: Preprocessing (on CPU runner)
  preprocessing:
    runs-on: ubuntu-latest
    needs: quality-checks
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    outputs:
      data-artifact: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run preprocessing
        run: |
          python main.py --config configs/config.yaml --preprocess-only
        env:
          DATASET_NAME: ${{ github.event.inputs.dataset || 'roneneldan/TinyStories' }}
      
      - name: Upload preprocessed data
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: preprocessed-data
          path: |
            data/processed/*.bin
            data/processed/tokenizer.json
            data/processed/meta.pkl
          retention-days: 7

  # Job 3: Training (on Modal GPU)
  training:
    runs-on: ubuntu-latest
    needs: preprocessing
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install modal
      
      - name: Download preprocessed data
        uses: actions/download-artifact@v4
        with:
          name: preprocessed-data
          path: data/processed/
      
      - name: Configure Modal
        run: |
          modal token set --token-id ${{ secrets.MODAL_TOKEN_ID }} --token-secret ${{ secrets.MODAL_TOKEN_SECRET }}
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      
      - name: Deploy Modal app and train
        run: |
          python scripts/train_with_modal.py --config configs/config.yaml
      
      - name: Upload trained model
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            models/trained_models/**/*.pt
            models/trained_models/**/tokenizer.json
          retention-days: 30

  # Job 4: Build Docker Image
  build-docker:
    runs-on: ubuntu-latest
    needs: training
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download trained model
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/best_model/
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:buildcache,mode=max

  # Job 5: Deploy to Production
  deploy:
    runs-on: ubuntu-latest
    needs: build-docker
    if: (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true') || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/llm-inference
            docker-compose pull
            docker-compose up -d
            docker-compose ps

  # Job 6: Integration Tests
  integration-tests:
    runs-on: ubuntu-latest
    needs: deploy
    if: needs.deploy.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install test dependencies
        run: |
          pip install pytest requests websockets
      
      - name: Run integration tests
        run: |
          pytest tests/integration/ -v
        env:
          API_URL: ${{ secrets.DEPLOY_HOST }}

  # Job 7: Notify
  notify:
    runs-on: ubuntu-latest
    needs: [quality-checks, preprocessing, training, build-docker, deploy, integration-tests]
    if: always()
    steps:
      - name: Send notification
        run: |
          echo "Pipeline Status:"
          echo "Quality Checks: ${{ needs.quality-checks.result }}"
          echo "Preprocessing: ${{ needs.preprocessing.result }}"
          echo "Training: ${{ needs.training.result }}"
          echo "Docker Build: ${{ needs.build-docker.result }}"
          echo "Deploy: ${{ needs.deploy.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
