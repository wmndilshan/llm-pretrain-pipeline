name: LLM Training Pipeline CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      dataset:
        description: "Dataset to train on"
        required: false
        default: "roneneldan/TinyStories"

env:
  PYTHON_VERSION: "3.10"
  DEFAULT_DATASET: "roneneldan/TinyStories"

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort
          pip install -r requirements.txt

      - name: Run black
        run: black --check src/ scripts/ *.py || true

      - name: Run isort
        run: isort --check-only src/ scripts/ *.py || true

      - name: Run flake8
        run: flake8 src/ scripts/ *.py --max-line-length=100 --ignore=E203,W503 || true

  validate:
    name: Validate Pipeline
    runs-on: ubuntu-latest
    needs: quality-checks
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run local validation
        run: python scripts/validate_pipeline.py --config configs/config.yaml

  preprocessing:
    name: Preprocess Data
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    outputs:
      dataset: ${{ steps.dataset.outputs.dataset }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve dataset
        id: dataset
        shell: bash
        run: |
          DATASET="${{ github.event.inputs.dataset }}"
          if [ -z "$DATASET" ]; then
            DATASET="${{ env.DEFAULT_DATASET }}"
          fi
          echo "dataset=$DATASET" >> "$GITHUB_OUTPUT"
          echo "Selected dataset: $DATASET"

      - name: Run preprocessing
        run: |
          python scripts/preprocess_only.py \
            --config configs/config.yaml \
            --dataset "${{ steps.dataset.outputs.dataset }}"

      - name: Upload preprocessed data
        uses: actions/upload-artifact@v4
        with:
          name: preprocessed-data
          path: |
            data/processed/**
          retention-days: 7

  training:
    name: Modal Training
    runs-on: ubuntu-latest
    needs: preprocessing
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install modal

      - name: Download preprocessed data
        uses: actions/download-artifact@v4
        with:
          name: preprocessed-data
          path: data/processed/

      - name: Configure Modal
        shell: bash
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          if [ -z "$MODAL_TOKEN_ID" ] || [ -z "$MODAL_TOKEN_SECRET" ]; then
            echo "[FAIL] Missing MODAL_TOKEN_ID or MODAL_TOKEN_SECRET in GitHub repository secrets."
            exit 1
          fi

          modal token set --token-id "$MODAL_TOKEN_ID" --token-secret "$MODAL_TOKEN_SECRET"

      - name: Run Modal training
        run: |
          python scripts/train_with_modal.py \
            --config configs/config.yaml \
            --single-dataset "${{ needs.preprocessing.outputs.dataset }}"

      - name: Upload trained model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            models/current/**
            models/trained_models/**
          retention-days: 30

  summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    needs: [quality-checks, validate, preprocessing, training]
    if: always()
    steps:
      - name: Print workflow summary
        run: |
          echo "Pipeline Status"
          echo "Quality Checks: ${{ needs.quality-checks.result }}"
          echo "Validation: ${{ needs.validate.result }}"
          echo "Preprocessing: ${{ needs.preprocessing.result }}"
          echo "Training: ${{ needs.training.result }}"
