name: Monthly Model Training

on:
  schedule:
    - cron: "0 2 1 * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Force training even if the safety budget is exceeded"
        required: false
        type: boolean
        default: false
      dataset:
        description: "Optional dataset override"
        required: false
        default: ""

env:
  PYTHON_VERSION: "3.10"

jobs:
  plan-monthly-run:
    name: Plan Monthly Run
    runs-on: ubuntu-latest
    outputs:
      dataset: ${{ steps.plan.outputs.dataset }}
      can_proceed: ${{ steps.plan.outputs.can_proceed }}
      remaining_safe: ${{ steps.plan.outputs.remaining_safe }}
      estimated_cost: ${{ steps.plan.outputs.estimated_cost }}
      gpu: ${{ steps.plan.outputs.gpu }}
      steps: ${{ steps.plan.outputs.steps }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install planning dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Determine dataset and budget status
        id: plan
        shell: bash
        run: |
          python - <<'PY'
          import os
          import sys
          import yaml
          from datetime import datetime

          sys.path.insert(0, os.getcwd())
          from src.orchestration.budget_tracker import BudgetTracker

          with open("configs/config.yaml", "r", encoding="utf-8") as f:
              base_config = yaml.safe_load(f)

          with open("configs/monthly_schedule.yaml", "r", encoding="utf-8") as f:
              schedule_config = yaml.safe_load(f)

          month = datetime.utcnow().month
          month_key = f"month_{month}"
          rotated_dataset = schedule_config.get("schedule", {}).get("rotating_datasets", {}).get(
              month_key,
              base_config["dataset"]["name"],
          )

          dataset_override = os.environ.get("DATASET_OVERRIDE", "").strip()
          dataset = dataset_override or rotated_dataset

          monthly_budget = schedule_config.get("schedule", {}).get(
              "monthly_budget",
              base_config.get("budget", {}).get("monthly_limit", 30.0),
          )
          gpu_type = base_config.get("hardware", {}).get("modal_gpu", "A10G")
          max_steps = base_config.get("training", {}).get("max_steps", 50000)

          tracker = BudgetTracker(monthly_budget=monthly_budget)
          params_m = tracker.estimate_model_params_millions_from_config(base_config)
          estimate = tracker.estimate_cost(
              max_steps=max_steps,
              gpu_type=gpu_type,
              model_params_millions=params_m,
          )
          remaining_safe = estimate.safety_margin_budget - estimate.current_month_spending

          force_run = os.environ.get("FORCE_RUN", "false").lower() == "true"
          can_proceed = estimate.within_safety_margin or force_run

          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a", encoding="utf-8") as f:
              f.write(f"dataset={dataset}\n")
              f.write(f"can_proceed={str(can_proceed).lower()}\n")
              f.write(f"remaining_safe={remaining_safe:.2f}\n")
              f.write(f"estimated_cost={estimate.estimated_cost:.2f}\n")
              f.write(f"gpu={gpu_type}\n")
              f.write(f"steps={max_steps}\n")

          print(f"Dataset: {dataset}")
          print(f"GPU: {gpu_type}")
          print(f"Steps: {max_steps}")
          print(f"Estimated cost: ${estimate.estimated_cost:.2f}")
          print(f"Remaining safe budget: ${remaining_safe:.2f}")

          if not can_proceed:
              print("[FAIL] Monthly run exceeds the configured safety budget.")
              sys.exit(1)
          PY
        env:
          DATASET_OVERRIDE: ${{ github.event.inputs.dataset }}
          FORCE_RUN: ${{ github.event.inputs.force_run }}

  validate-and-preprocess:
    name: Validate And Preprocess
    needs: plan-monthly-run
    if: needs.plan-monthly-run.outputs.can_proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run validation
        run: python scripts/validate_pipeline.py --config configs/config.yaml

      - name: Preprocess selected dataset
        run: |
          python scripts/preprocess_only.py \
            --config configs/config.yaml \
            --dataset "${{ needs.plan-monthly-run.outputs.dataset }}"

      - name: Upload preprocessed data
        uses: actions/upload-artifact@v4
        with:
          name: monthly-preprocessed-data
          path: |
            data/processed/**
          retention-days: 7

  train-monthly-model:
    name: Train Monthly Model
    needs: [plan-monthly-run, validate-and-preprocess]
    if: needs.plan-monthly-run.outputs.can_proceed == 'true'
    runs-on: ubuntu-latest
    outputs:
      model_version: ${{ steps.meta.outputs.model_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install modal

      - name: Download preprocessed data
        uses: actions/download-artifact@v4
        with:
          name: monthly-preprocessed-data
          path: data/processed/

      - name: Configure Modal
        shell: bash
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          if [ -z "$MODAL_TOKEN_ID" ] || [ -z "$MODAL_TOKEN_SECRET" ]; then
            echo "[FAIL] Missing MODAL_TOKEN_ID or MODAL_TOKEN_SECRET in GitHub repository secrets."
            exit 1
          fi

          modal token set --token-id "$MODAL_TOKEN_ID" --token-secret "$MODAL_TOKEN_SECRET"

      - name: Generate model version
        id: meta
        shell: bash
        run: |
          VERSION="v$(date -u +%Y.%m.%d)"
          echo "model_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Model version: $VERSION"

      - name: Run monthly training
        run: |
          python scripts/train_with_modal.py \
            --config configs/config.yaml \
            --single-dataset "${{ needs.plan-monthly-run.outputs.dataset }}"

      - name: Upload monthly model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: monthly-model-${{ steps.meta.outputs.model_version }}
          path: |
            models/current/**
            models/trained_models/**
          retention-days: 90

  summary:
    name: Monthly Summary
    needs: [plan-monthly-run, validate-and-preprocess, train-monthly-model]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Print monthly summary
        run: |
          echo "Monthly Training Summary"
          echo "Dataset: ${{ needs.plan-monthly-run.outputs.dataset }}"
          echo "Estimated Cost: ${{ needs.plan-monthly-run.outputs.estimated_cost }}"
          echo "GPU: ${{ needs.plan-monthly-run.outputs.gpu }}"
          echo "Steps: ${{ needs.plan-monthly-run.outputs.steps }}"
          echo "Plan: ${{ needs.plan-monthly-run.result }}"
          echo "Validation and Preprocess: ${{ needs.validate-and-preprocess.result }}"
          echo "Training: ${{ needs.train-monthly-model.result }}"
