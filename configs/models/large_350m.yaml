model_architecture:
  name: "large-350m-transformer"
  version: "1.0.0"
  parameter_count: 350000000
  architecture_family: "decoder-only-transformer"
  dimensions:
    embedding_dimension: 1024
    attention_head_count: 16
    transformer_layer_count: 24
    feed_forward_dimension: 4096
    vocabulary_size: 50000
    maximum_sequence_length: 2048
  architecture_features:
    use_rotary_position_embeddings: true
    use_grouped_query_attention: true
    grouped_query_kv_head_count: 4
    use_flash_attention: true
    use_rms_normalization: true
    use_swiglu_activation: true
  regularization:
    dropout_probability: 0.1
  optimization:
    enable_gradient_checkpointing: true
    enable_model_compilation: false

training_configuration:
  optimizer:
    learning_rate: 0.00025
    weight_decay_coefficient: 0.1
    gradient_clipping_threshold: 1.0
    optimizer_beta1: 0.9
    optimizer_beta2: 0.95
  learning_rate_schedule:
    warmup_steps_count: 3000
    total_training_steps: 75000
  batch_configuration:
    batch_size_per_device: 4
    gradient_accumulation_steps: 8
    target_effective_batch_size: 256
  duration:
    total_training_steps: 75000
    early_stopping_patience: 5
  monitoring:
    evaluation_interval_steps: 750
    checkpoint_save_interval_steps: 3000
    logging_interval_steps: 50
  checkpoint_management:
    checkpoint_directory: "./models/checkpoints"
    keep_last_n_checkpoints: 3
    keep_best_checkpoint: true
  data_loading:
    num_workers: 4
    prefetch_factor: 2
    pin_memory: true
    persistent_workers: true

dataset_configuration:
  training_dataset:
    name: "Skylion007/openwebtext"
    cache_directory: "./data/cache"
    processed_directory: "./data/processed"
  preprocessing:
    maximum_sequence_length: 2048
  split_ratios:
    train: 0.95
    validation: 0.05
    test: 0.0

infrastructure_configuration:
  compute:
    target_device: "cuda"
    enable_mixed_precision: true
  modal_gpu:
    gpu_type: "A100-80GB"

budget_configuration:
  monthly_budget_usd: 90.0
  safety_margin_percentage: 90
  training_phases:
    phase_1_foundation:
      dataset: "roneneldan/TinyStories"
      gpu_type: "A10G"
      training_steps: 20000
      estimated_cost_usd: 6.0
      description: "Foundation stage"
    phase_2_expansion:
      dataset: "Skylion007/openwebtext"
      gpu_type: "A100-80GB"
      training_steps: 40000
      estimated_cost_usd: 24.0
      description: "Large-scale knowledge expansion"
    phase_3_specialization:
      dataset: "codeparrot/github-code"
      gpu_type: "A100-80GB"
      training_steps: 15000
      estimated_cost_usd: 9.0
      description: "High-context domain tuning"

monitoring_configuration:
  logging:
    log_directory: "./logs"
  metrics:
    enable_tensorboard: true
    enable_wandb: false

inference_configuration:
  generation:
    default_max_new_tokens: 512
    default_temperature: 0.8
    default_top_k: 50
    default_top_p: 0.95
    default_repetition_penalty: 1.05

metadata:
  configuration_version: "2.0.0"
  profile: "large_350m"
  purpose: "Higher-capacity profile with A100-80GB training"
