services:
  inference-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: llm-inference-server
    ports:
      - "8000:8000"
    volumes:
      - ../models/current:/app/models:ro
      - ../logs:/app/logs
    environment:
      MODEL_PATH: /app/models/best_model.pt
      TOKENIZER_PATH: /app/models/tokenizer.json
      ADAPTIVE_MODE: "true"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
